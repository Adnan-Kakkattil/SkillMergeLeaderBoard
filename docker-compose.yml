services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: skillmerge
      MYSQL_USER: skillmerge
      MYSQL_PASSWORD: skillmergepass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "3306:3306"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: skillmerge
      DB_PASSWORD: skillmergepass
      DB_NAME: skillmerge
      JWT_SECRET: replace-this-secret
      JWT_EXPIRES_IN: 12h
      BCRYPT_ROUNDS: 10
      DB_RETRIES: 40
      DB_RETRY_DELAY_MS: 2000
      CORS_ORIGIN: http://localhost:8080
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123456
      PLAYER_USERNAME: player1
      PLAYER_PASSWORD: player123456
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  mysql_data:
